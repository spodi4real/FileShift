<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FileShift</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  </head>
  <body>

    <nav class="navbar">
      <div class="logo">⚡ FileShift</div>
    </nav>

    <main class="main">
      <div class="hero">
        <h1>Your Files.<br/>Your Way.</h1>
        <p>Convert your files free & fast</p>

        <div class="upload-card">
          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" hidden accept=".docx,.pdf,.mp4,.mp3,.wav" />
            <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
            <p class="drop-text">Drag & drop or <span class="browse">browse</span></p>
            <p class="drop-sub" id="fileName">Supports DOCX, PDF, MP4, MP3, WAV</p>
          </div>

          <div id="convertRow" style="display:none;">
            <label class="convert-label">Convert to:</label>
            <select id="formatSelect" class="text-input"></select>
            <button class="btn-primary" onclick="handleConvert()">
              <i class="fa-solid fa-bolt"></i> Convert
            </button>
          </div>
        </div>

      </div>
    </main>

    <div id="statusToast" class="toast"></div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
